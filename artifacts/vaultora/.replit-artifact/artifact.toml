kind = "mobile"
previewPath = "/"
title = "Vaultora"
version = "1.0.0"
id = "artifacts/vaultora"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 20468

[services.development]
run = "pnpm --filter @workspace/vaultora run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vaultora", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/vaultora", "run", "serve" ]

[services.env]
PORT = "20468"
BASE_PATH = "/"
